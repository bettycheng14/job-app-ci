---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-auth-pvc
  namespace: default
  labels:
    app: mongo-auth
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-jobapp-pvc
  namespace: default
  labels:
    app: mongo-jobapp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-auth
  namespace: default
  labels:
    app: mongo-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-auth
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mongo-auth
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-auth-data
              mountPath: /data/db
          resources:
            requests:
              cpu: "10m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: mongo-auth-data
          persistentVolumeClaim:
            claimName: mongo-auth-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mongo-auth
  namespace: default
  labels:
    app: mongo-auth
spec:
  selector:
    app: mongo-auth
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-jobapp
  namespace: default
  labels:
    app: mongo-jobapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-jobapp
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mongo-jobapp
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-jobapp-data
              mountPath: /data/db
          resources:
            requests:
              cpu: "10m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: mongo-jobapp-data
          persistentVolumeClaim:
            claimName: mongo-jobapp-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mongo-jobapp
  namespace: default
  labels:
    app: mongo-jobapp
spec:
  selector:
    app: mongo-jobapp
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
  type: ClusterIP
