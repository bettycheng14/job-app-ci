global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: 'auth-service'
    static_configs:
      - targets: ['${DEPLOY_HOST}:${PROD_PORT_AUTH}']
    metrics_path: /metrics

  - job_name: 'jobapp-service'
    static_configs:
      - targets: ['${DEPLOY_HOST}:${PROD_PORT_JOBAPP}']
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
